name: Feature or improvement
description: Suggest an idea, enhancement, or documentation improvement
title: "[Feature] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for **ideas and enhancements**. For **bugs**, choose **Bug report** instead.

  - type: textarea
    id: problem
    attributes:
      label: Problem or gap
      description: What is hard, missing, or confusing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: How would you like Honeycomb to behave? Sketches, pseudo-config, or API shape welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you solved it, or why the current catalog/layout model isn’t enough.
    validations:
      required: false

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I’m willing to open a PR for this (or help review one)
          required: false
